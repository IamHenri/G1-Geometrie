<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page déplacée — Notes de Maths</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2e3247;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: normal;
      color: #c9d1f5;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    p {
      font-size: 0.95rem;
      color: #9098b8;
      line-height: 1.7;
      margin-bottom: 0.8rem;
    }

    .old-url {
      display: inline-block;
      background: #12141c;
      border: 1px solid #2e3247;
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #f08080;
      margin: 0.5rem 0 1.5rem;
      word-break: break-all;
    }

    .arrow {
      font-size: 1.4rem;
      color: #5c6bc0;
      margin: 0.5rem 0 1.2rem;
    }

    .btn {
      display: inline-block;
      background: #3f51b5;
      color: #fff;
      text-decoration: none;
      padding: 0.85rem 2.2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-family: Georgia, serif;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn:hover {
      background: #5c6bc0;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .new-url {
      display: block;
      margin-top: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: #5c6bc0;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #464c6a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📐</div>
    <h1>Cette page a déménagé</h1>
    <p>Le contenu que vous cherchez ici</p>
    <span class="old-url" id="old-url">est obsolète…</span>
    <p>Tout a été déplacé vers un nouveau site, plus complet et à jour.</p>
    <div class="arrow">↓</div>
    <a class="btn" href="https://iamhenri.github.io/notes-maths-tex/">
      Accéder aux Notes de Maths →
    </a>
    <span class="new-url">iamhenri.github.io/notes-maths-tex/</span>
    <footer>Ce site (G1-Géométrie) n'est plus maintenu.</footer>
  </div>

  <script>
    // Affiche l'URL que le visiteur cherchait
    const path = window.location.pathname;
    const el = document.getElementById('old-url');
    if (path && path !== '/') {
      el.textContent = 'iamhenri.github.io/G1-Geometrie' + path;
    }
  </script>
</body>
</html>
